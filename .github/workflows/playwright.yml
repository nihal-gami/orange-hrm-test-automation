name: Orange HRM E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install chromium
    
    - name: Run Playwright tests
      run: npm run test:auth
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-results
        path: |
          test-results/
          playwright-report/
        retention-days: 7
    
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-html-report
        path: playwright-report/
        retention-days: 7

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Test Results Summary
      run: |
        echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "Epic: HRM-41 🔐 Authentication & Authorization" >> $GITHUB_STEP_SUMMARY
        echo "Test execution completed for Orange HRM Demo automation suite" >> $GITHUB_STEP_SUMMARY
        echo "### Test Coverage:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Valid Login Test Automation (HRM-42)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Invalid Login Attempts Test Automation (HRM-43)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Password Field Masking Test Automation (HRM-44)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Role-Based Access Control Test Automation (HRM-45)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Logout Functionality Test Automation (HRM-46)" >> $GITHUB_STEP_SUMMARY 