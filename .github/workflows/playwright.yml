name: Orange HRM E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    
    - name: Run Global Setup
      run: npx playwright test --config=playwright.config.ts --grep="global-setup"
      continue-on-error: true
    
    - name: Run Authentication Tests
      run: npx playwright test tests/auth/ --reporter=html,junit,json
      env:
        NODE_ENV: ci
    
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30
    
    - name: Upload Screenshots & Videos
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-failures
        path: |
          test-results/screenshots/
          test-results/videos/
        retention-days: 30
    
    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Playwright Test Results
        path: test-results/results.xml
        reporter: java-junit
        fail-on-error: true
    
    - name: Comment PR with Test Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          try {
            const results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
            const totalTests = results.suites.reduce((sum, suite) => 
              sum + suite.specs.reduce((suiteSum, spec) => suiteSum + spec.tests.length, 0), 0);
            const passedTests = results.suites.reduce((sum, suite) => 
              sum + suite.specs.reduce((suiteSum, spec) => 
                suiteSum + spec.tests.filter(test => test.results[0].status === 'passed').length, 0), 0);
            const failedTests = totalTests - passedTests;
            
            const comment = `## 🧪 Test Results
            
            **Authentication Test Suite Results:**
            - ✅ **Passed**: ${passedTests}
            - ❌ **Failed**: ${failedTests}
            - 📊 **Total**: ${totalTests}
            - 🎯 **Success Rate**: ${Math.round((passedTests / totalTests) * 100)}%
            
            **Test Categories:**
            - AUTH-001: Valid Login Tests
            - AUTH-002: Invalid Login Tests  
            - AUTH-003: Password Masking Tests
            - AUTH-004: Role-Based Access Tests
            - AUTH-005: Logout Functionality Tests
            
            **Epic**: [HRM-47 - Authentication & Authorization Test Suite](https://velotio-automation.atlassian.net/browse/HRM-47)
            
            [View Detailed Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('No test results found or error parsing results:', error);
          }

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Security Audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Check for Dependency Vulnerabilities
      run: npx audit-ci --moderate
      continue-on-error: true 